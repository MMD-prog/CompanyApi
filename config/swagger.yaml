openapi: 3.0.0

info:
  title: Company API
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: local server

tags:
  - name: Companies
    description: Company endpoints

  - name: Employees
    description: Employee endpoints

paths:
  /companies:
    get:
      tags:
        - Companies
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          example: BAE
      responses:
        '200':
          description: List of companies
        '404':
          description: No companies found
        '500':
          description: Internal server error

    post:
      tags:
        - Companies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: SwaggerDefault
                email:
                  type: string
                  example: swagger@contact.com
                address:
                  type: string
                  example: KHBP
      responses:
        '201':
          description: Company created successfully
        '500':
          description: Internal server error

  /companies/{id}:
    get:
      tags:
        - Companies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Company found
        '404':
          description: Company not found
        '500':
          description: Internal server error

    put:
      tags:
        - Companies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Company updated successfully
        '404':
          description: Company not found
        '500':
          description: Internal server error

    delete:
      tags:
        - Companies
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Company deleted successfully
        '404':
          description: Company not found
        '500':
          description: Internal server error

  /employees:
    get:
      tags:
        - Employees
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
          example: Mousa
      responses:
        '200':
          description: List of employees
        '404':
          description: No employees found matching the search criteria
        '500':
          description: Internal server error

    post:
      tags:
        - Employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - company_id
              properties:
                name:
                  type: string
                  example: Mousa Estefan
                email:
                  type: string
                  example: mousa@test.com
                company_id:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Employee created successfully
        '500':
          description: Internal server error

  /employees/{id}:
    get:
      tags:
        - Employees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Employee found
        '404':
          description: Employee not found
        '500':
          description: Internal server error

    put:
      tags:
        - Employees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                company_id:
                  type: integer
      responses:
        '200':
          description: Employee updated successfully
        '404':
          description: Employee not found
        '500':
          description: Internal server error

    delete:
      tags:
        - Employees
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Employee deleted successfully
        '404':
          description: Employee not found
        '500':
          description: Internal server error